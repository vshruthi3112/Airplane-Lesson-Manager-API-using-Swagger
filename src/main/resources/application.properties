# ============================================================
# APPLICATION PROPERTIES
# ============================================================
# This file configures Spring Boot's behavior.
# Spring Boot reads this file automatically at startup.

# --- Server Configuration ---
# The port your API runs on (default is 8080)
server.port=9090

# --- Swagger / OpenAPI Configuration ---
# Path where you access Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Sort API endpoints alphabetically by method (GET, POST, PUT, DELETE)
springdoc.swagger-ui.operations-sorter=method

# Show the "Try it out" button expanded by default
springdoc.swagger-ui.try-it-out-enabled=true

# --- Logging (helpful for learning) ---
# Show which beans Spring creates (DEBUG level for Spring context)
logging.level.org.springframework.web=INFO
logging.level.com.example.lessonmanager=DEBUG
